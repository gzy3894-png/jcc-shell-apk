name: Build APK
on:
  workflow_dispatch:
  push:
    branches: [master, main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - name: Wrapper + build
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon --stacktrace
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release-unsigned.apk dist/jcc-shell-unsigned.apk 2>/dev/null || true
          cp app/build/outputs/apk/release/*.apk dist/ || true
          ./gradlew :app:assembleDebug --no-daemon
          cp app/build/outputs/apk/debug/app-debug.apk dist/jcc-shell-v2.5.1.apk
          find app -name 'jcc_inject' -type f 2>/dev/null | head -20
          INJ=$(find app -name 'jcc_inject' -type f 2>/dev/null | head -1)
          if [ -n "$INJ" ]; then cp -f "$INJ" dist/jcc_inject; chmod +x dist/jcc_inject; ls -la dist/jcc_inject; fi
          ls -la dist/
          unzip -l dist/jcc-shell-v2.5.1.apk | grep -E 'libJCC|lib/' || true
      - uses: actions/upload-artifact@v4
        with:
          name: jcc-shell-apk-2.5.1
          path: |
            dist/*.apk
            dist/jcc_inject
